<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iPad Touch Craft Pro</title>
    <style>
        /* 画面を完全に固定してスクロールやバウンスを防ぐ */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            position: fixed;
            touch-action: none; /* タッチによるスクロール・拡大縮小を禁止 */
            user-select: none;
            -webkit-user-select: none;
        }
        canvas { display: block; }

        /* 左下の前進ボタン */
        #moveBtn {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 85px;
            height: 85px;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid #fff;
            border-radius: 50%;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            outline: none;
            z-index: 10;
        }

        /* 画面上のブロック切り替えツールバー */
        #toolbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px;
            border-radius: 8px;
            z-index: 10;
        }
        .block-btn {
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #fff;
            border-radius: 50px;
            background: #555;
            color: #fff;
            outline: none;
        }
        /* 選択中のボタンを目立たせる */
        .block-btn.active {
            background: #fff;
            color: #000;
            border-color: #ffcc00;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <button id="moveBtn">前進</button>

    <div id="toolbar">
        <button class="block-btn active" onclick="selectBlock('dirt', this)">土</button>
        <button class="block-btn" onclick="selectBlock('stone', this)">石</button>
        <button class="block-btn" onclick="selectBlock('gold', this)">金</button>
    </div>

    <script>
        // --- 1. 基本セットアップ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 空

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5); 
        camera.rotation.order = 'YXZ'; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ライト
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x505050)); 

        // --- 2. ブロック素材（マテリアル）の定義 ---
        const geometry = new THREE.BoxGeometry(1, 1, 1);

        // 床用（草）
        const grassMaterial = new THREE.MeshLambertMaterial({ color: 0x556b2f }); 

        // プレイヤーが追加できるブロックの種類
        const blockMaterials = {
            dirt: new THREE.MeshLambertMaterial({ color: 0x8b4513 }),  // 土（茶色）
            stone: new THREE.MeshLambertMaterial({ color: 0x808080 }), // 石（灰色）
            gold: new THREE.MeshLambertMaterial({ color: 0xffd700 })   // 金（金色）
        };

        // 現在選択されているブロックの種類（最初は土）
        let currentBlockType = 'dirt';

        // ブロックボタンが押された時の処理
        function selectBlock(type, buttonElement) {
            currentBlockType = type;
            // 一度すべてのボタンの「active」クラスを消す
            document.querySelectorAll('.block-btn').forEach(btn => btn.classList.remove('active'));
            // 押されたボタンに「active」クラスをつける
            buttonElement.classList.add('active');
        }

        // ボタンのタップが「ゲーム画面のタップ」と誤認されないように防ぐ設定
        document.getElementById('toolbar').addEventListener('touchstart', (e) => e.stopPropagation());
        document.getElementById('toolbar').addEventListener('touchend', (e) => e.stopPropagation());

        // 地面を敷き詰める（5x5）
        for (let x = -2; x <= 2; x++) {
            for (let z = -2; z <= 2; z++) {
                const cube = new THREE.Mesh(geometry, grassMaterial);
                cube.position.set(x, 0, z);
                scene.add(cube);
            }
        }

        // --- 3. タッチ操作の実実装（バウンス対策含む） ---
        let isTouching = false;
        let prevTouchX = 0;
        let prevTouchY = 0;
        let isMoved = false; 

        // Safariのジェスチャー（ピンチイン・アウト）を禁止する
        window.addEventListener('gesturestart', (e) => e.preventDefault());

        window.addEventListener('touchstart', (e) => {
            // UI以外の画面タッチ時のみバウンスを防ぐ
            if(e.target.tagName !== 'BUTTON') {
                e.preventDefault(); 
            }
            isTouching = true;
            prevTouchX = e.touches[0].clientX;
            prevTouchY = e.touches[0].clientY;
            isMoved = false; 
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!isTouching) return;
            e.preventDefault(); // 画面全体のスクロールを完全に止める

            const deltaX = e.touches[0].clientX - prevTouchX;
            const deltaY = e.touches[0].clientY - prevTouchY;

            camera.rotation.y -= deltaX * 0.005;
            camera.rotation.x -= deltaY * 0.005;
            camera.rotation.x = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, camera.rotation.x));

            prevTouchX = e.touches[0].clientX;
            prevTouchY = e.touches[0].clientY;
            isMoved = true; 
        }, { passive: false });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('touchend', (e) => {
            isTouching = false;

            if (!isMoved && e.changedTouches.length > 0) {
                const touch = e.changedTouches[0];
                
                // ボタンの上で指が離れた場合はブロックを置かない
                if (touch.target.tagName === 'BUTTON') return;

                mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children);

                if (intersects.length > 0) {
                    const intersect = intersects[0];
                    
                    // 現在選択されている素材（土・石・金）でブロックを作る
                    const selectedMaterial = blockMaterials[currentBlockType];
                    const newCube = new THREE.Mesh(geometry, selectedMaterial);

                    newCube.position.copy(intersect.point).add(intersect.face.normal.clone().multiplyScalar(0.5));
                    
                    newCube.position.x = Math.floor(newCube.position.x + 0.5);
                    newCube.position.y = Math.floor(newCube.position.y + 0.5);
                    newCube.position.z = Math.floor(newCube.position.z + 0.5);

                    scene.add(newCube);
                }
            }
        });

        // --- 4. 移動ボタンの処理 ---
        let isMoving = false;
        const moveBtn = document.getElementById('moveBtn');

        moveBtn.addEventListener('touchstart', (e) => { isMoving = true; e.stopPropagation(); e.preventDefault(); }, { passive: false });
        moveBtn.addEventListener('touchend', (e) => { isMoving = false; e.stopPropagation(); });

        // --- 5. アニメーションループ ---
        const moveSpeed = 0.05;
        const direction = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            if (isMoving) {
                camera.getWorldDirection(direction);
                direction.y = 0; 
                direction.normalize();
                camera.position.addScaledVector(direction, moveSpeed);
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
