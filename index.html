<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>iPad Touch Craft</title>
    <style>
        body { margin: 0; overflow: hidden; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        /* 画面左下の移動ボタン */
        #moveBtn {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid #fff;
            border-radius: 50%;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            outline: none;
        }
    </style>
    <!-- Three.jsの読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <button id="moveBtn">前進</button>

    <script>
        // --- 1. 基本セットアップ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 空の色

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5); // プレイヤーの初期位置（高さ2）
        // マイクラのような視点移動にするための重要設定
        camera.rotation.order = 'YXZ'; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 光源（ライト）を追加して3Dに立体感を出す
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040)); // 全体を軽く明るく

        // --- 2. ブロックの設定と床の作成 ---
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshLambertMaterial({ color: 0x7cfc00 }); // 黄緑色の地面用ブロック

        // 5x5の地面をあらかじめ敷き詰める
        for (let x = -2; x <= 2; x++) {
            for (let z = -2; z <= 2; z++) {
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(x, 0, z); // 高さは0
                scene.add(cube);
            }
        }

        // 新しく置くブロックの見た目（茶色）
        const blockMaterial = new THREE.MeshLambertMaterial({ color: 0x8b4513 });

        // --- 3. タッチ操作の実装 ---
        let isTouching = false;
        let prevTouchX = 0;
        let prevTouchY = 0;
        let isMoved = false; // スワイプしたか、ただのタップかの判定用

        // 画面に指が触れたとき
        window.addEventListener('touchstart', (e) => {
            isTouching = true;
            prevTouchX = e.touches[0].clientX;
            prevTouchY = e.touches[0].clientY;
            isMoved = false; // まだ動いていない
        }, { passive: false });

        // 指を動かしたとき（視点変更）
        window.addEventListener('touchmove', (e) => {
            if (!isTouching) return;
            
            const deltaX = e.touches[0].clientX - prevTouchX;
            const deltaY = e.touches[0].clientY - prevTouchY;

            // スワイプ量に応じてカメラを回転（0.005は感度調整）
            camera.rotation.y -= deltaX * 0.005;
            camera.rotation.x -= deltaY * 0.005;

            // 真上や真下を向いたときに画面がひっくり返らないように制限
            camera.rotation.x = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, camera.rotation.x));

            prevTouchX = e.touches[0].clientX;
            prevTouchY = e.touches[0].clientY;
            isMoved = true; // 動いたので「スワイプ」とみなす
        }, { passive: false });

        // 指を離したとき（ブロック設置）
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('touchend', (e) => {
            isTouching = false;

            // 指を動かさずに「ポン」とタップしただけならブロックを置く
            if (!isMoved && e.changedTouches.length > 0) {
                const touch = e.changedTouches[0];
                
                // タップした位置を3D空間の座標に変換
                mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children);

                // 何かのブロックに当たっていたら
                if (intersects.length > 0) {
                    const intersect = intersects[0];
                    const newCube = new THREE.Mesh(geometry, blockMaterial);

                    // タップした「面」の向き（法線ベクトル）に合わせて、隣に配置する
                    newCube.position.copy(intersect.point).add(intersect.face.normal.clone().multiplyScalar(0.5));
                    
                    // マイクラのように綺麗にマス目に合わせる（整地）
                    newCube.position.x = Math.floor(newCube.position.x + 0.5);
                    newCube.position.y = Math.floor(newCube.position.y + 0.5);
                    newCube.position.z = Math.floor(newCube.position.z + 0.5);

                    scene.add(newCube);
                }
            }
        });

        // --- 4. 移動ボタンの処理 ---
        let isMoving = false;
        const moveBtn = document.getElementById('moveBtn');

        // ボタンを押している間はフラグをON（windowのタッチイベントが誤作動しないようstopPropagationする）
        moveBtn.addEventListener('touchstart', (e) => { isMoving = true; e.stopPropagation(); });
        moveBtn.addEventListener('touchend', (e) => { isMoving = false; e.stopPropagation(); });

        // --- 5. ゲームの更新ループ ---
        const moveSpeed = 0.05;
        const direction = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            // 前進ボタンが押されている場合、カメラの向いている方向に進む
            if (isMoving) {
                camera.getWorldDirection(direction);
                direction.y = 0; // 上下には浮かばず、水平に移動させる
                direction.normalize();
                camera.position.addScaledVector(direction, moveSpeed);
            }

            renderer.render(scene, camera);
        }
        animate();

        // 画面サイズ変更対策
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
