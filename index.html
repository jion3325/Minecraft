<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iPad Craft - Collision Edition</title>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%;
            position: fixed; touch-action: none; user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; }

        /* 十字キー（移動コントローラー）の配置 */
        #dpad {
            position: absolute; bottom: 30px; left: 30px;
            width: 130px; height: 130px; z-index: 10;
        }
        .pad-btn {
            position: absolute; width: 42px; height: 42px;
            background: rgba(255, 255, 255, 0.6); border: 2px solid #fff;
            border-radius: 8px; font-size: 12px; font-weight: bold; color: #333; outline: none;
        }
        #btn-forward  { top: 0; left: 44px; }
        #btn-left     { top: 44px; left: 0; }
        #btn-right    { top: 44px; right: 0; }
        #btn-backward { bottom: 0; left: 44px; }

        /* ツールバー */
        #toolbar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0, 0, 0, 0.4); padding: 8px; border-radius: 8px; z-index: 10;
        }
        .block-btn {
            padding: 10px 15px; font-size: 14px; font-weight: bold;
            border: 2px solid #fff; border-radius: 50px; background: #555; color: #fff; outline: none;
        }
        .block-btn.active { background: #fff; color: #000; border-color: #ffcc00; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="dpad">
        <button class="pad-btn" id="btn-forward">前</button>
        <button class="pad-btn" id="btn-left">左</button>
        <button class="pad-btn" id="btn-right">右</button>
        <button class="pad-btn" id="btn-backward">後</button>
    </div>

    <div id="toolbar">
        <button class="block-btn active" onclick="selectBlock('dirt', this)">土</button>
        <button class="block-btn" onclick="selectBlock('stone', this)">石</button>
        <button class="block-btn" onclick="selectBlock('gold', this)">金</button>
    </div>

    <script>
        // --- 1. 基本セットアップ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5); // プレイヤーの初期位置 (高さY=2)
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x505050));

        // --- 2. ブロックデータ管理と床の作成 ---
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const grassMaterial = new THREE.MeshLambertMaterial({ color: 0x556b2f });
        const blockMaterials = {
            dirt: new THREE.MeshLambertMaterial({ color: 0x8b4513 }),
            stone: new THREE.MeshLambertMaterial({ color: 0x808080 }),
            gold: new THREE.MeshLambertMaterial({ color: 0xffd700 })
        };
        let currentBlockType = 'dirt';

        // ⭐ここに存在するブロックの座標を "X,Y,Z" の文字列をキーにして記録する
        const worldBlocks = {};

        function addBlockToWorld(x, y, z, material) {
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(x, y, z);
            scene.add(cube);
            // 座標を記録 (例: "1,0,-2": true)
            worldBlocks[`${x},${y},${z}`] = true;
        }

        // 初期床（5x5、高さ0）を設置してデータに登録
        for (let x = -2; x <= 2; x++) {
            for (let z = -2; z <= 2; z++) {
                addBlockToWorld(x, 0, z, grassMaterial);
            }
        }

        function selectBlock(type, buttonElement) {
            currentBlockType = type;
            document.querySelectorAll('.block-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
        }

        // UIタップ時の貫通防止
        document.getElementById('toolbar').addEventListener('touchstart', (e) => e.stopPropagation());
        document.getElementById('dpad').addEventListener('touchstart', (e) => e.stopPropagation());

        // --- 3. 当たり判定（衝突チェック）の関数 ---
        // プレイヤーの体（半径0.3の太さ）がブロックにめり込んでいないか調べる
        function checkCollision(nextX, nextY, nextZ) {
            const radius = 0.3;
            // プレイヤーの周囲4つの角の座標をチェック
            const checkPoints = [
                { x: nextX - radius, z: nextZ - radius },
                { x: nextX + radius, z: nextZ - radius },
                { x: nextX - radius, z: nextZ + radius },
                { x: nextX + radius, z: nextZ + radius }
            ];
            // プレイヤーの足元(Y=1)と、頭(Y=2)の高さにブロックがあるか調べる
            const checkY = [Math.floor(nextY - 1), Math.floor(nextY)];

            for (let pt of checkPoints) {
                const bx = Math.floor(pt.x + 0.5);
                const bz = Math.floor(pt.z + 0.5);
                for (let by of checkY) {
                    // もしその座標にブロックが記録されていたら「衝突（true）」を返す
                    if (worldBlocks[`${bx},${by},${bz}`]) {
                        return true; 
                    }
                }
            }
            return false; // ぶつかっていない
        }

        // --- 4. タッチでの視点変更とブロック設置 ---
        let isTouching = false;
        let prevTouchX = 0, prevTouchY = 0, isMoved = false;

        window.addEventListener('gesturestart', (e) => e.preventDefault());
        window.addEventListener('touchstart', (e) => {
            if(e.target.tagName !== 'BUTTON') e.preventDefault();
            isTouching = true;
            prevTouchX = e.touches[0].clientX;
            prevTouchY = e.touches[0].clientY;
            isMoved = false;
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!isTouching) return;
            e.preventDefault();
            const deltaX = e.touches[0].clientX - prevTouchX;
            const deltaY = e.touches[0].clientY - prevTouchY;

            camera.rotation.y -= deltaX * 0.005;
            camera.rotation.x -= deltaY * 0.005;
            camera.rotation.x = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, camera.rotation.x));

            prevTouchX = e.touches[0].clientX;
            prevTouchY = e.touches[0].clientY;
            isMoved = true;
        }, { passive: false });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('touchend', (e) => {
            isTouching = false;
            if (!isMoved && e.changedTouches.length > 0) {
                const touch = e.changedTouches[0];
                if (touch.target.tagName === 'BUTTON') return;

                mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children);

                if (intersects.length > 0) {
                    const intersect = intersects[0];
                    const selectedMaterial = blockMaterials[currentBlockType];

                    // 設置予定の座標を計算
                    const targetPos = intersect.point.clone().add(intersect.face.normal.clone().multiplyScalar(0.5));
                    const bx = Math.floor(targetPos.x + 0.5);
                    const by = Math.floor(targetPos.y + 0.5);
                    const bz = Math.floor(targetPos.z + 0.5);

                    // プレイヤーの体にめり込む位置には置けないようにする
                    const pbx = Math.floor(camera.position.x + 0.5);
                    const pbz = Math.floor(camera.position.z + 0.5);
                    if (bx === pbx && bz === pbz && (by === 1 || by === 2)) {
                        return; // 置かせない
                    }

                    // 世界にブロックを追加
                    addBlockToWorld(bx, by, bz, selectedMaterial);
                }
            }
        });

        // --- 5. 十字キーの移動フラグ設定 ---
        const moveFlags = { forward: false, backward: false, left: false, right: false };

        function setupGridButton(id, flagName) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { moveFlags[flagName] = true; e.preventDefault(); e.stopPropagation(); }, { passive: false });
            btn.addEventListener('touchend', (e) => { moveFlags[flagName] = false; e.stopPropagation(); });
        }
        setupGridButton('btn-forward', 'forward');
        setupGridButton('btn-backward', 'backward');
        setupGridButton('btn-left', 'left');
        setupGridButton('btn-right', 'right');

        // --- 6. ゲームループ（移動と当たり判定の連動） ---
        const moveSpeed = 0.05;
        const frontVec = new THREE.Vector3();
        const sideVec = new THREE.Vector3();
        const moveVec = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            // 移動ベクトルのリセット
            moveVec.set(0, 0, 0);

            // カメラの向いている方角をベースに「前進・後退」の向きを計算
            camera.getWorldDirection(frontVec);
            frontVec.y = 0;
            frontVec.normalize();

            // 「左右」の向きは、前進ベクトルの直角方向
            sideVec.copy(frontVec).applyAxisAngle(new THREE.Vector3(0, 1, 0), -Math.PI / 2);

            // 押されているボタンに応じて移動量を足し算する
            if (moveFlags.forward)  moveVec.add(frontVec);
            if (moveFlags.backward) moveVec.addScaledVector(frontVec, -1);
            if (moveFlags.left)     moveVec.addScaledVector(sideVec, -1);
            if (moveFlags.right)    moveVec.add(sideVec);

            if (moveVec.lengthSq() > 0) {
                moveVec.normalize().multiplyScalar(moveSpeed);

                // 💡壁にぶつかった時に「滑る」ように動かすため、X軸とZ軸を別々に判定する
                // まずはX方向だけ進めてみて、ぶつからなければ位置を確定
                const targetX = camera.position.x + moveVec.x;
                if (!checkCollision(targetX, camera.position.y, camera.position.z)) {
                    camera.position.x = targetX;
                }
                
                // 次にZ方向だけ進めてみて、ぶつからなければ位置を確定
                const targetZ = camera.position.z + moveVec.z;
                if (!checkCollision(camera.position.x, camera.position.y, targetZ)) {
                    camera.position.z = targetZ;
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
